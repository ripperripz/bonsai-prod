<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <script>
    window.onerror = function (msg, url, line, col, error) {
      document.body.innerHTML += '<div style="color:red; font-size: 20px; z-index:9999; position:fixed; top:0; left:0; width:100%; height:100%; background:white; padding:20px; text-align:left; overflow:auto;">' +
        '<strong>Global Error:</strong><br/>' + msg + '<br/>' +
        'URL: ' + url + '<br/>' +
        'Line: ' + line + '<br/>' +
        'Col: ' + col + '<br/>' +
        'Stack: ' + (error ? error.stack : 'N/A') +
        '</div>';
      return false;
    };
    window.addEventListener('unhandledrejection', function (event) {
      document.body.innerHTML += '<div style="color:red; font-size: 20px; z-index:9999; position:fixed; top:50%; left:0; width:100%; height:50%; background:white; padding:20px; text-align:left; border-top: 2px solid black; overflow:auto;">' +
        '<strong>Unhandled Promise Rejection:</strong><br/>' + event.reason +
        '</div>';
    });
  </script>
  <title>Bonsai | Oasis of Serenity</title>
  <meta name="description" content="Japanese-inspired luxury residential project in Riyadh." />

  <!-- Resource Hints -->
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="dns-prefetch" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://unpkg.com">
  <link rel="dns-prefetch" href="https://unpkg.com">

    as="style">

    href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;200;300;400;500;600;700&family=Noto+Sans+JP:wght@200;300;400&family=Tajawal:wght@300;400;500;700;800&display=swap"
    rel="stylesheet" media="print" onload="this.media='all'">

  <!-- Leaflet Assets (Deferred) -->
